# MASTERd uv configuration
#
# Enforces AMD ROCm PyTorch index for all Python package resolution in this
# project. The primary index is the nightly ROCm 6.3 build (which carries
# torch+rocm7.2 wheels). The stable ROCm 6.2.4 index is the fallback.
#
# Rules:
# - torch / torchaudio / torchvision MUST be installed with
#   `--index pytorch-rocm-nightly` to force the ROCm wheel.
# - Never install from PyPI directly for GPU packages.

[pip]
# Apply ROCm constraints globally in this project.
constraint-dependencies = ["config/rocm-constraints.txt"]

[[index]]
name = "pytorch-rocm-nightly"
url = "https://download.pytorch.org/whl/nightly/rocm6.3"
explicit = true

[[index]]
name = "pytorch-rocm-stable"
url = "https://download.pytorch.org/whl/rocm6.2.4"
explicit = true

[[index]]
name = "pypi"
url = "https://pypi.org/simple"
default = true
